name: Setup Labels

# 워크플로 트리거에 꼭 필요한 라벨 2개만 유지하고 나머지는 삭제.
# 상태 추적은 issue/PR의 open·closed, "Mark as duplicate", 코멘트로 충분.
# Actions 탭 → "Setup Labels" → "Run workflow" 클릭으로 실행. Idempotent.

on:
  workflow_dispatch:

jobs:
  setup:
    runs-on: ubuntu-latest
    permissions:
      issues: write

    steps:
      - name: Sync labels (create / update / delete)
        uses: actions/github-script@v7
        with:
          script: |
            // 워크플로 트리거에 필수인 라벨 2개만 유지
            const KEEP = [
              {
                name: 'domain-report',
                color: 'ef4444',
                description: '사칭 의심 도메인 신고 / Suspicious domain impersonation report',
              },
              {
                name: 'whitelist-request',
                color: '10b981',
                description: '공식 도메인 등록 요청 / Whitelist addition request',
              },
            ];

            // GitHub 기본 라벨 + 이전에 만들었던 운영 라벨 모두 삭제
            const DELETE = [
              'bug',
              'documentation',
              'enhancement',
              'invalid',
              'question',
              'wontfix',
              'good first issue',
              'help wanted',
              'needs-triage',
              'needs-review',
              'blacklist-pr',
              'whitelist-pr',
              'confirmed',
              'not-confirmed',
              'duplicate',
            ];

            const { owner, repo } = context.repo;
            const log = [];

            // 1. KEEP — upsert
            for (const label of KEEP) {
              try {
                await github.rest.issues.getLabel({ owner, repo, name: label.name });
                await github.rest.issues.updateLabel({
                  owner, repo,
                  name: label.name,
                  new_name: label.name,
                  color: label.color,
                  description: label.description,
                });
                log.push(`updated  ${label.name}`);
              } catch (err) {
                if (err.status === 404) {
                  await github.rest.issues.createLabel({
                    owner, repo,
                    name: label.name,
                    color: label.color,
                    description: label.description,
                  });
                  log.push(`created  ${label.name}`);
                } else {
                  log.push(`FAILED   ${label.name}: ${err.message}`);
                  throw err;
                }
              }
            }

            // 2. DELETE
            for (const name of DELETE) {
              try {
                await github.rest.issues.deleteLabel({ owner, repo, name });
                log.push(`deleted  ${name}`);
              } catch (err) {
                if (err.status === 404) {
                  log.push(`skipped  ${name} (not found)`);
                } else {
                  log.push(`FAILED   ${name}: ${err.message}`);
                  throw err;
                }
              }
            }

            core.summary
              .addHeading('Label sync results')
              .addCodeBlock(log.join('\n'))
              .write();
            console.log(log.join('\n'));
