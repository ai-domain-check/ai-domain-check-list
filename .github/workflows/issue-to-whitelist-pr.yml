name: Issue → Whitelist PR

# whitelist-request 라벨 이슈가 생성되면 폼 내용을 파싱해 whitelist.json에 추가하는 PR을 자동 생성.
# blacklist 워크플로와 같은 구조지만, 검증이 더 엄격하므로 PR 체크리스트가 길고
# 메인테이너가 publisher·evidence를 더 신중하게 확인해야 함.

on:
  issues:
    types: [opened, labeled, reopened]

jobs:
  draft-whitelist-pr:
    if: contains(github.event.issue.labels.*.name, 'whitelist-request')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate whitelist entry from issue body
        uses: actions/github-script@v7
        env:
          ISSUE_BODY: ${{ github.event.issue.body }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_AUTHOR: ${{ github.event.issue.user.login }}
        with:
          script: |
            const fs = require('fs');
            const body = process.env.ISSUE_BODY || '';
            const issueNumber = process.env.ISSUE_NUMBER;
            const issueAuthor = process.env.ISSUE_AUTHOR;

            function getSection(labelRegex) {
              const re = new RegExp(`###\\s*${labelRegex}\\s*\\n+([\\s\\S]+?)(?=\\n###\\s|$)`, 'i');
              const m = body.match(re);
              return m ? m[1].trim() : '';
            }

            const domainRaw = getSection('추가할 도메인 또는 URL');
            const publisher = getSection('운영 주체.*');
            const categoryRaw = getSection('카테고리');
            const allowSubdomainsRaw = getSection('서브도메인 허용 여부');
            const evidenceRaw = getSection('공식 도메인 증명');

            if (!domainRaw) {
              core.setFailed('도메인 필드를 찾지 못했습니다. 폼 라벨이 변경됐는지 확인.');
              return;
            }

            // URL이면 hostname + pathname 분리, hostname만이면 paths 생략
            let domain;
            let paths;
            try {
              const u = new URL(domainRaw.startsWith('http') ? domainRaw : `https://${domainRaw}`);
              domain = u.hostname.toLowerCase();
              if (u.pathname && u.pathname !== '/') {
                paths = [u.pathname];
              }
            } catch (e) {
              domain = domainRaw.toLowerCase().replace(/^https?:\/\//, '').split('/')[0];
            }

            // 카테고리 — 드롭다운 값 첫 토큰만 추출. "llm (대화형/언어 모델)" → "llm"
            const allowedCategories = ['llm', 'image', 'audio', 'video', 'code', 'agent', 'other'];
            let category;
            const firstToken = categoryRaw.split(/[\s(]/)[0].toLowerCase();
            if (allowedCategories.includes(firstToken)) {
              category = firstToken;
            }

            // allowSubdomains — 한국어 옵션 파싱
            let allowSubdomains;
            if (allowSubdomainsRaw.startsWith('허용')) allowSubdomains = true;
            else if (allowSubdomainsRaw.startsWith('미허용')) allowSubdomains = false;
            // '잘 모름' / 미선택 → undefined로 두고 메인테이너가 결정

            // evidence URL 추출. - / * / • bullet 제거 후 http(s) 시작하는 라인만.
            const evidenceUrls = evidenceRaw
              .split('\n')
              .map((l) => l.trim())
              .map((l) => l.replace(/^[-*•]\s*/, ''))
              .filter((l) => /^https?:\/\//.test(l));

            // 원 이슈 URL을 evidence에 항상 포함 (검토 컨텍스트로)
            const issueUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/issues/${issueNumber}`;
            if (!evidenceUrls.includes(issueUrl)) {
              evidenceUrls.push(issueUrl);
            }

            const entry = {
              domain,
              publisher: publisher || '(검토 필요)',
              ...(category ? { category } : {}),
              ...(allowSubdomains !== undefined ? { allowSubdomains } : {}),
              ...(paths ? { paths } : {}),
              evidence: evidenceUrls,
              addedAt: new Date().toISOString().slice(0, 10),
              addedBy: `@${issueAuthor}`,
            };

            const whitelistPath = 'whitelist.json';
            const list = JSON.parse(fs.readFileSync(whitelistPath, 'utf8'));

            const duplicate = list.some((e) =>
              e.domain === entry.domain &&
              JSON.stringify(e.paths || null) === JSON.stringify(entry.paths || null),
            );
            if (duplicate) {
              core.setFailed(`이미 whitelist에 등록된 entry: ${entry.domain}${entry.paths ? entry.paths.join(',') : ''}`);
              return;
            }

            list.push(entry);
            fs.writeFileSync(whitelistPath, JSON.stringify(list, null, 2) + '\n');

            core.summary
              .addHeading('드래프트 whitelist entry')
              .addCodeBlock(JSON.stringify(entry, null, 2), 'json')
              .write();

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "Add whitelist entry from issue #${{ github.event.issue.number }}"
          title: "[whitelist] Add entry from issue #${{ github.event.issue.number }}"
          body: |
            이슈 #${{ github.event.issue.number }}의 요청으로 자동 생성된 whitelist 추가 PR입니다.

            ## 검토 체크리스트 (blacklist보다 엄격)

            **소유권 검증:**
            - [ ] `domain`이 정말 해당 publisher 소유인지 (Wikipedia·공식 announcement·whois 등 두 가지 이상 교차 검증)
            - [ ] `publisher`가 정확한 회사·조직 명칭인지 (오탈자·약어 확인)
            - [ ] `evidence` 링크가 객관적·공개 검증 가능한가 (비공개 자료뿐이면 거부)

            **스코프 결정:**
            - [ ] `allowSubdomains` 결정 — 회사가 정말 그 도메인의 모든 서브도메인을 운영하는가
            - [ ] `paths` 필요한가 — UGC 호스팅(github.com 등) 위에 있으면 반드시 좁힐 것
            - [ ] `category`가 적절한가

            **거부 사유 예시:**
            - 운영 주체 불명확 → 거부 + 사유 코멘트
            - 증거가 비공개 자료뿐 → 거부
            - 사용자 콘텐츠 호스팅 플랫폼 자체(notion.site, vercel.app 등)를 추가하려는 시도 → 거부
            - "AI 같은 사이트"라는 추측 → 거부

            머지하시면 다음 fetch 사이클에 모든 사용자에게 녹색 "공식" 배지가 표시됩니다.
            거부하시려면 이 PR을 닫고 이슈에 사유를 코멘트한 뒤 이슈도 닫아주세요.

            Closes #${{ github.event.issue.number }}
          branch: whitelist/issue-${{ github.event.issue.number }}
          base: main
          labels: whitelist-pr,needs-review
          delete-branch: true
