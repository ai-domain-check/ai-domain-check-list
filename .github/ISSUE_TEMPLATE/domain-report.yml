name: 사칭/의심 도메인 신고
description: AI 도구를 사칭하는 것으로 의심되는 도메인을 신고합니다
title: "[report] "
labels: ["domain-report", "needs-triage"]
body:
  - type: markdown
    attributes:
      value: |
        AI 도구를 사칭하는 것으로 보이는 사이트를 신고해주세요.
        메인테이너가 검토 후 사실로 확인되면 blacklist에 추가되어 모든 사용자에게 빨간 "사칭 의심" 배지가 표시됩니다.

        **본인의 개인정보·계정정보·결제정보는 절대 본문에 적지 마세요.**
        도메인과 공개 가능한 증거만 적어주시면 됩니다.

  - type: input
    id: domain
    attributes:
      label: 신고할 도메인 또는 URL
      description: "전체 URL을 적어주시면 좋습니다(경로 포함). 예: https://sites.google.com/view/claudversion09"
      placeholder: example.com
    validations:
      required: true

  - type: input
    id: impersonates
    attributes:
      label: 어떤 AI 도구를 사칭하나요?
      description: 사칭 대상 공식 도구 이름과 공식 도메인
      placeholder: "예: Claude (claude.ai)"
    validations:
      required: true

  - type: dropdown
    id: discovery
    attributes:
      label: 어떻게 발견하셨나요?
      options:
        - 검색 결과의 광고(Sponsored)
        - 검색 결과의 일반 링크
        - 이메일 또는 메신저 링크
        - SNS·커뮤니티 게시물
        - 확장프로그램이 "미확인"으로 표시해서 의심하게 됨
        - 기타
    validations:
      required: true

  - type: textarea
    id: evidence
    attributes:
      label: 사칭 증거
      description: |
        스크린샷 이미지는 본문에 드래그해 첨부하거나, 외부 호스팅 링크를 붙여주세요.
        도움 되는 정보:
        - 사칭 페이지의 로그인·결제 UI 스크린샷
        - 공식 페이지와의 시각적 차이 비교
        - 도메인 등록 정보(whois)
        - 광고로 발견했다면 노출된 검색 키워드
      placeholder: |
        - 스크린샷:
        - 공식 페이지와의 차이점:
        - whois·도메인 등록 정보:
    validations:
      required: true

  - type: textarea
    id: notes
    attributes:
      label: 추가 정보 (선택)
      description: 다른 사칭 도메인과의 연관성, 추정 운영 주체, 결제 흐름 등 도움이 될 만한 정보
    validations:
      required: false

  - type: checkboxes
    id: agreements
    attributes:
      label: 확인 사항
      options:
        - label: 개인정보(이름, 계정, 결제정보 등)를 본문에 포함하지 않았습니다
          required: true
        - label: 단순 추측이 아니라 객관적 근거에 기반한 신고입니다
          required: true
